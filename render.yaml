services:
  - type: web
    name: facegen-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 180
    envVars:
      - key: REPLICATE_API_TOKEN
        sync: false   # Render dashboard mein manually add karein
